    // ==========================================
    // 2. 內嵌原 RetroSynth.ts 的 Web Audio API 音效
    // ==========================================
    class RetroSynth {
      constructor() {
        this.ctx = null;
        this.muted = true;
        this.sizzleOsc = null;
        this.sizzleGain = null;
      }
      init() {
        if (!this.ctx) {
          this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        }
      }
      setMute(m) {
        this.muted = m;
        if (m) this.stopFireSizzle();
      }
      triggerRoar() {
        if (this.muted) return;
        this.init();
        const now = this.ctx.currentTime;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(90, now);
        osc.frequency.linearRampToValueAtTime(40, now + 0.4);
        gain.gain.setValueAtTime(0.3, now);
        gain.gain.linearRampToValueAtTime(0.01, now + 0.4);
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        osc.start(now);
        osc.stop(now + 0.4);
      }
      triggerEatSound() {
        if (this.muted) return;
        this.init();
        const now = this.ctx.currentTime;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(150, now);
        osc.frequency.setValueAtTime(300, now + 0.08);
        gain.gain.setValueAtTime(0.15, now);
        gain.gain.linearRampToValueAtTime(0.01, now + 0.15);
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        osc.start(now);
        osc.stop(now + 0.15);
      }
      startFireSizzle() {
        if (this.muted || this.sizzleOsc) return;
        this.init();
        try {
          const now = this.ctx.currentTime;
          this.sizzleOsc = this.ctx.createOscillator();
          this.sizzleGain = this.ctx.createGain();
          this.sizzleOsc.type = 'square';
          this.sizzleOsc.frequency.setValueAtTime(220, now);
          this.sizzleGain.gain.setValueAtTime(0.03, now);
          
          const lfo = this.ctx.createOscillator();
          const lfoGain = this.ctx.createGain();
          lfo.type = 'sawtooth';
          lfo.frequency.setValueAtTime(35, now);
          lfoGain.gain.setValueAtTime(100, now);
          lfo.connect(lfoGain);
          lfoGain.connect(this.sizzleOsc.frequency);
          
          this.sizzleOsc.connect(this.sizzleGain);
          this.sizzleGain.connect(this.ctx.destination);
          
          lfo.start(now);
          this.sizzleOsc.start(now);
          this.sizzleOsc.lfoRef = lfo;
        } catch(e){}
      }
      stopFireSizzle() {
        if (this.sizzleOsc) {
          try {
            this.sizzleOsc.stop();
            this.sizzleOsc.lfoRef.stop();
          } catch(e){}
          this.sizzleOsc = null;
          this.sizzleGain = null;
        }
      }
    }

    // ==========================================
    // 5. 主網頁元件 App 實作
    // ==========================================
    function App() {
      const canvasRef = useRef(null);
      const synthRef = useRef(null);

      const [selectedSkinIndex, setSelectedSkinIndex] = useState(0);
      const [selectedFlameIndex, setSelectedFlameIndex] = useState(0);
      const [isWalking, setIsWalking] = useState(true);
      const [isFiring, setIsFiring] = useState(true);
      const [soundEnabled, setSoundEnabled] = useState(false);
      const [consumedCount, setConsumedCount] = useState(0);

      const walkSpeed = 1.2;
      const dinoScale = 2.1;
      const flameSpeed = 5.2;
      const beamWidth = 6;
      const flameGravity = -0.02;

      const selectedSkin = DINO_SKINS[selectedSkinIndex];
      const selectedFlame = FLAME_PRESETS[selectedFlameIndex];

      const dinoRef = useRef({
        x: 220, y: 0, direction: 1, frameIndex: 0, ticks: 0,
        isEating: false, eatingTicks: 0,
        speechBubble: { text: "點擊天空丟零食餵我！🦖", ticks: 150 }
      });

      const snacksRef = useRef([]);
      const treesRef = useRef([]);
      const starsRef = useRef([]);
      const sparksRef = useRef([]);

      const getSynth = () => {
        if (!synthRef.current) {
          synthRef.current = new RetroSynth();
        }
        return synthRef.current;
      };

      const toggleSound = () => {
        const isNowOn = !soundEnabled;
        setSoundEnabled(isNowOn);
        const synth = getSynth();
        synth.setMute(!isNowOn);
        if (isNowOn) {
          synth.triggerRoar();
          if (isFiring) synth.startFireSizzle();
        } else {
          synth.stopFireSizzle();
        }
      };

      const populateEnvironment = () => {
        const newTrees = [];
        for (let i = 0; i < 8; i++) {
          newTrees.push({
            id: i,
            x: 60 + i * 90 + Math.random() * 20,
            heightScale: 0.85 + Math.random() * 0.3
          });
        }
        treesRef.current = newTrees;

        const newStars = [];
        for (let i = 0; i < 30; i++) {
          newStars.push({
            x: Math.random() * 728,
            y: Math.random() * 45,
            size: 0.8 + Math.random() * 1.5,
            alpha: Math.random(),
            blinkSpeed: 0.006 + Math.random() * 0.012
          });
        }
        starsRef.current = newStars;
      };

      const cycleSkin = () => {
        setSelectedSkinIndex((prev) => (prev + 1) % DINO_SKINS.length);
        getSynth().triggerEatSound();
      };

      const cycleFlame = () => {
        setSelectedFlameIndex((prev) => (prev + 1) % FLAME_PRESETS.length);
        getSynth().triggerEatSound();
      };

      const triggerReset = () => {
        snacksRef.current = [];
        sparksRef.current = [];
        dinoRef.current.x = 220;
        dinoRef.current.direction = 1;
        dinoRef.current.speechBubble = { text: "系統重新設定！", ticks: 100 };
        getSynth().triggerRoar();
      };

      const handleDropSnack = (type) => {
        const freshSnack = {
          id: Date.now(),
          type,
          x: 80 + Math.random() * 568,
          y: -10, vy: 1, isGrounded: false, size: 2.8
        };
        snacksRef.current.push(freshSnack);
      };

      useEffect(() => {
        populateEnvironment();
      }, []);

      useEffect(() => {
        const synth = getSynth();
        if (isFiring && soundEnabled) {
          synth.startFireSizzle();
        } else {
          synth.stopFireSizzle();
        }
        return () => synth.stopFireSizzle();
      }, [isFiring, soundEnabled]);

      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        if (!ctx) return;

        let animId;
        let frameCount = 0;

        const renderLoop = () => {
          frameCount++;
          const w = canvas.width;
          const h = canvas.height;
          const gY = h - 16;
          const dState = dinoRef.current;

          ctx.fillStyle = '#0a0d17';
          ctx.fillRect(0, 0, w, h);

          starsRef.current.forEach(star => {
            star.alpha += star.blinkSpeed;
            if (star.alpha > 1 || star.alpha < 0.2) star.blinkSpeed = -star.blinkSpeed;
            ctx.fillStyle = `rgba(255, 255, 255, ${star.alpha})`;
            ctx.fillRect(star.x, star.y, star.size, star.size);
          });

          ctx.strokeStyle = 'rgba(99, 102, 241, 0.04)';
          ctx.lineWidth = 1;
          for (let x = 0; x < w; x += 40) {
            ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke();
          }

          ctx.fillStyle = '#111827';
          ctx.fillRect(0, gY, w, 16);

          ctx.strokeStyle = 'rgba(99, 102, 241, 0.25)';
          ctx.lineWidth = 1.5;
          ctx.beginPath(); ctx.moveTo(0, gY); ctx.lineTo(w, gY); ctx.stroke();

          treesRef.current.forEach(t => {
            const frameSet = TREE_FRAMES.healthy;
            const treeH = frameSet.length;
            const treeW = frameSet[0].length;
            const sway = Math.sin(frameCount * 0.03 + t.x * 0.1) * 0.8;
            const tScale = 1.4 * t.heightScale;
            const tLeftX = t.x - (treeW * tScale) / 2 + sway;
            const tTopY = gY - treeH * tScale + 1;

            for (let r = 0; r < treeH; r++) {
              const rowStr = frameSet[r];
              for (let c = 0; c < treeW; c++) {
                const char = rowStr[c];
                if (char === '.') continue;
                let col = 'transparent';
                if (char === 'T') col = '#047857';
                else if (char === 'H') col = '#78350f';
                if (col !== 'transparent') {
                  ctx.fillStyle = col;
                  ctx.fillRect(tLeftX + c * tScale, tTopY + r * tScale, tScale, tScale);
                }
              }
            }
          });

          snacksRef.current.forEach(sn => {
            if (!sn.isGrounded) {
              sn.vy += 0.22; sn.y += sn.vy;
              if (sn.y >= gY - 6) {
                sn.y = gY - 6; sn.vy = -sn.vy * 0.3;
                if (Math.abs(sn.vy) < 0.4) sn.isGrounded = true;
              }
            }
          });

          const dinoW = 24 * dinoScale;
          const dinoH = 20 * dinoScale;
          dState.y = gY - dinoH + 2;

          if (dState.isEating) {
            dState.eatingTicks++;
            if (dState.eatingTicks > 45) {
              dState.isEating = false; dState.eatingTicks = 0;
            }
          }

          if (isWalking && !dState.isEating) {
            dState.ticks++;
            if (dState.ticks % 6 === 0) dState.frameIndex = (dState.frameIndex + 1) % DINO_FRAMES.walk.length;
            dState.x += dState.direction * walkSpeed;

            let hasFoodNear = false;
            let foodToChase = null;
            let shortestDist = 99999;

            snacksRef.current.forEach(sn => {
              const dx = sn.x - (dState.x + dinoW / 2);
              if (Math.abs(dx) < shortestDist) {
                shortestDist = Math.abs(dx); foodToChase = sn;
              }
            });

            if (foodToChase && shortestDist < 300) {
              hasFoodNear = true;
              const targetDir = foodToChase.x > (dState.x + dinoW / 2) ? 1 : -1;
              if (targetDir !== dState.direction) dState.direction = targetDir;
            }

            if (!hasFoodNear) {
              if (dState.x > w - dinoW - 20 && dState.direction === 1) dState.direction = -1;
              else if (dState.x < 20 && dState.direction === -1) dState.direction = 1;
            }
          } else {
            dState.ticks++;
            if (dState.ticks % 15 === 0) dState.frameIndex = (dState.frameIndex + 1) % DINO_FRAMES.idle.length;
          }

          snacksRef.current = snacksRef.current.filter(sn => {
            const dCenterX = dState.x + dinoW / 2;
            if (Math.abs(sn.x - dCenterX) < 24 && sn.y > gY - 14) {
              dState.isEating = true; dState.eatingTicks = 0;
              setConsumedCount(prev => prev + 1);
              const nomTexts = ["好吃！ ♥", "美味 ✨", "讚啦 🍰", "嗷嗚 🍎"];
              dState.speechBubble = {
                text: nomTexts[Math.floor(Math.random() * nomTexts.length)], ticks: 80
              };
              getSynth().triggerEatSound();

              for (let s = 0; s < 8; s++) {
                sparksRef.current.push({
                  x: sn.x, y: sn.y,
                  vx: (Math.random() - 0.5) * 3, vy: (Math.random() - 1) * 3,
                  color: sn.type === 'apple' ? '#ef4444' : '#fb7185',
                  size: 2, life: 0, maxLife: 15 + Math.random() * 10
                });
              }
              return false;
            }
            return true;
          });

          if (frameCount % 600 === 0 && Math.random() > 0.5 && !dState.speechBubble) {
            const quotes = ["吼！ ⚡", "無限循環", "舒服 ♪", "肚子餓了！"];
            dState.speechBubble = { text: quotes[Math.floor(Math.random() * quotes.length)], ticks: 100 };
          }

          let activeFrameMatrix = [];
          if (isFiring) {
            activeFrameMatrix = DINO_FRAMES.fire[(frameCount % 18 < 9) ? 0 : 1];
          } else if (dState.isEating) {
            activeFrameMatrix = DINO_FRAMES.fire[(frameCount % 10 < 5) ? 0 : 1];
          } else if (isWalking) {
            activeFrameMatrix = DINO_FRAMES.walk[dState.frameIndex % DINO_FRAMES.walk.length];
          } else {
            activeFrameMatrix = DINO_FRAMES.idle[dState.frameIndex % DINO_FRAMES.idle.length];
          }

          const isFacingRight = dState.direction === 1;

          for (let r = 0; r < 20; r++) {
            const rowString = activeFrameMatrix[r];
            if (!rowString) continue;
            for (let c = 0; c < 24; c++) {
              const char = rowString[c];
              if (char === '.') continue;
              const drawCol = isFacingRight ? c : (23 - c);
              const px = dState.x + drawCol * dinoScale;
              const py = dState.y + r * dinoScale;

              let pixelColor = selectedSkin.primary;
              if (char === 'O') pixelColor = selectedSkin.primary;
              else if (char === 'B') pixelColor = selectedSkin.secondary;
              else if (char === 'S') pixelColor = isFiring ? (frameCount % 12 < 6 ? '#ffffff' : selectedFlame.primary) : selectedSkin.plates;
              else if (char === 'E') pixelColor = selectedSkin.eye;
              else if (char === 'C') pixelColor = selectedSkin.accent;
              else if (char === 'M') pixelColor = '#ffd200';

              ctx.fillStyle = pixelColor; ctx.fillRect(px, py, dinoScale, dinoScale);
            }
          }

          const mouthLocalX = isFacingRight ? 18.5 : 5.5;
          const realMouthX = dState.x + mouthLocalX * dinoScale;
          const realMouthY = dState.y + 5.2 * dinoScale;

          if (isFiring) {
            const count = Math.ceil(beamWidth / 2);
            for (let i = 0; i < count; i++) {
              const particleAngle = (isFacingRight ? 0 : Math.PI) + (Math.random() - 0.5) * 0.22;
              const pSpeed = flameSpeed * (0.8 + Math.random() * 0.4);
              sparksRef.current.push({
                x: realMouthX, y: realMouthY,
                vx: Math.cos(particleAngle) * pSpeed + (isWalking && !dState.isEating ? dState.direction * 0.5 : 0),
                vy: Math.sin(particleAngle) * pSpeed + (Math.random() - 0.5) * 1.0,
                color: Math.random() > 0.45 ? selectedFlame.primary : selectedFlame.secondary,
                size: 2.2 + Math.random() * 3, life: 0, maxLife: 24 + Math.random() * 16
              });
            }
          }

          snacksRef.current.forEach(sn => {
            const sM = sn.type === 'apple' ? APPLE_FRAME : CAKE_FRAME;
            const snackSize = sn.size;
            for (let r = 0; r < sM.length; r++) {
              const rowStr = sM[r];
              for (let c = 0; c < rowStr.length; c++) {
                const char = rowStr[c];
                if (char === '.') continue;
                let col = '#ef4444';
                if (char === 'L') col = '#10b981';
                else if (char === 'A') col = '#f43f5e';
                else if (char === 'C') col = '#f59e0b';
                else if (char === 'F') col = '#ffffff';
                else if (char === 'W') col = '#ffedd5';
                else if (char === 'M') col = '#ec4899';
                ctx.fillStyle = col;
                ctx.fillRect(sn.x + (c - rowStr.length / 2) * snackSize, sn.y + (r - sM.length / 2) * snackSize, snackSize, snackSize);
              }
            }
          });

          sparksRef.current.forEach(p => {
            p.life++; p.vy += flameGravity; p.x += p.vx; p.y += p.vy;
            ctx.fillStyle = p.color;
            ctx.fillRect(p.x, p.y, Math.max(0.8, p.size * (1 - p.life / p.maxLife)), Math.max(0.8, p.size * (1 - p.life / p.maxLife)));
          });

          sparksRef.current = sparksRef.current.filter(p => p.life < p.maxLife);

          if (dState.speechBubble && dState.speechBubble.ticks > 0) {
            dState.speechBubble.ticks--;
            ctx.font = 'bold 8px system-ui';
            const txt = dState.speechBubble.text;
            const txtW = ctx.measureText(txt).width;
            const rx = (dState.x + dinoW / 2) - (txtW + 10) / 2;
            const ry = dState.y - 4 - 14;

            ctx.fillStyle = 'rgba(15, 23, 42, 0.9)';
            ctx.strokeStyle = selectedFlame.primary;
            ctx.lineWidth = 1;
            ctx.fillRect(rx, ry, txtW + 10, 14);
            ctx.strokeRect(rx, ry, txtW + 10, 14);
            ctx.fillStyle = '#ffffff';
            ctx.fillText(txt, rx + 5, ry + 10);
          }

          animId = requestAnimationFrame(renderLoop);
        };

        renderLoop();
        return () => cancelAnimationFrame(animId);
      }, [selectedSkin, selectedFlame, isWalking, isFiring]);

      const handleCanvasClick = (e) => {
        const rect = canvasRef.current.getBoundingClientRect();
        const scaleX = 728 / rect.width;
        const scaleY = 90 / rect.height;
        snacksRef.current.push({
          id: Date.now(),
          type: Math.random() > 0.5 ? 'apple' : 'cake',
          x: (e.clientX - rect.left) * scaleX,
          y: ((e.clientY - rect.top) * scaleY) - 5,
          vy: 1, isGrounded: false, size: 2.8
        });
        getSynth().triggerEatSound();
      };

      return (
        <div className="min-h-screen bg-[#05070d] text-[#e2e8f0] font-sans flex flex-col items-center justify-center p-2 md:p-6 select-none overflow-hidden relative">
          <div className="absolute inset-0 bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-[#0e1628] via-[#040508] to-[#020305] pointer-events-none"></div>

          <div className="flex flex-col items-center gap-4 max-w-[760px] w-full z-10">
            <div className="relative w-full max-w-[728px] aspect-[728/90] bg-[#090d16] border border-white/10 rounded-xl overflow-hidden shadow-[0_0_40px_rgba(0,0,0,0.7)]">
              <canvas 
                ref={canvasRef}
                width={728}
                height={90}
                onClick={handleCanvasClick}
                className="w-full h-full block bg-[#070a11] cursor-crosshair transition-all outline-none"
              />

              <div className="absolute top-2 left-2 bg-slate-950/80 backdrop-blur-sm border border-white/5 px-2 py-0.5 rounded text-[8px] font-mono text-zinc-400 pointer-events-none uppercase">
                <span className="text-[#00f2ff] font-bold">● 恐龍巡邏排行榜</span> | 已餵食: <span className="text-pink-400 font-bold">{consumedCount}</span>
              </div>

              <div className="absolute top-1.5 right-1.5 flex gap-1 items-center">
                <button 
                  onClick={(e) => { e.stopPropagation(); handleDropSnack('apple'); }}
                  className="h-5 px-1.5 bg-red-950/80 hover:bg-red-900 border border-red-500/10 rounded text-[8px] font-mono text-red-300 transition-all cursor-pointer flex items-center gap-0.5"
                >
                  <Icons.Apple />
                  <span>蘋果</span>
                </button>

                <button 
                  onClick={(e) => { e.stopPropagation(); handleDropSnack('cake'); }}
                  className="h-5 px-1.5 bg-pink-950/80 hover:bg-pink-900 border border-pink-500/10 rounded text-[8px] font-mono text-pink-300 transition-all cursor-pointer flex items-center gap-0.5"
                >
                  <Icons.Sparkles />
                  <span>蛋糕</span>
                </button>

                <button 
                  onClick={(e) => { e.stopPropagation(); cycleSkin(); }}
                  title="切換外觀配色"
                  className="h-5 w-5 bg-slate-900 hover:bg-slate-800 border border-white/10 rounded flex items-center justify-center text-indigo-400 cursor-pointer"
                >
                  <Icons.Palette />
                </button>

                <button 
                  onClick={(e) => { e.stopPropagation(); cycleFlame(); }}
                  title="切換原子吐息"
                  className="h-5 w-5 bg-slate-900 hover:bg-slate-800 border border-white/10 rounded flex items-center justify-center text-orange-400 cursor-pointer"
                >
                  <Icons.Flame />
                </button>

                <button 
                  onClick={(e) => { e.stopPropagation(); toggleSound(); }}
                  className={`h-5 px-1.5 rounded text-[8px] font-mono transition-all border flex items-center gap-1 cursor-pointer ${
                    soundEnabled 
                    ? 'border-emerald-500 bg-emerald-950/80 text-emerald-400 font-bold' 
                    : 'border-white/10 bg-slate-900 text-zinc-400 hover:text-zinc-200'
                  }`}
                >
                  {soundEnabled ? <Icons.Volume2 /> : <Icons.VolumeX />}
                  <span>{soundEnabled ? '音效: ON' : '音效: OFF'}</span>
                </button>

                <button 
                  onClick={(e) => { e.stopPropagation(); triggerReset(); }}
                  title="重設畫面"
                  className="h-5 w-5 bg-slate-900 hover:bg-slate-800 border border-white/10 rounded flex items-center justify-center text-zinc-400 hover:text-white cursor-pointer"
                >
                  <Icons.RotateCcw />
                </button>
              </div>

              <div className="absolute bottom-1 right-2 bg-slate-950/70 py-0.5 px-2 rounded border border-white/5 text-[7.5px] font-mono text-zinc-500 pointer-events-none">
                點擊 Banner 任何草地或天空，都可以掉下點心餵食喔！
              </div>
            </div>

            <div className="text-center font-mono opacity-60">
              <p className="text-[10px] text-zinc-500 uppercase tracking-widest leading-relaxed">
                PIXEL DINO AMBIENT PATROL BANNER <span className="text-indigo-400 font-bold">728 x 90</span> SCREENPLAY
              </p>
            </div>
          </div>
        </div>
      );
    }

    // ==========================================
    // 6. 將元件渲染到網域 (全新瀏覽器頂層安全渲染寫法)
    // ==========================================
    const container = document.getElementById('root');
    const reactRoot = window.ReactDOM.createRoot(container);
    reactRoot.render(React.createElement(App));
  </script>
</body>
</html>
