<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pixel Dino Looker Studio Full-Width</title>
  <style>
    /* 強制拔除所有邊距，讓網頁原生就是滿版 */
    html, body {
      margin: 0; padding: 0; width: 100%; height: 100%; background-color: #05070d; overflow: hidden;
      color: #e2e8f0; font-family: ui-sans-serif, system-ui, sans-serif;
    }
    .select-none { user-select: none; -webkit-user-select: none; }
    
    .btn-action {
      height: 24px; padding: 0 10px; border-radius: 4px; font-family: monospace; font-size: 11px;
      cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 4px;
      border: 1px solid rgba(255,255,255,0.15); background-color: #0f172a; color: #a1a1aa;
    }
    .btn-action:hover { background-color: #1e293b; color: #fff; }
    .btn-apple { background-color: rgba(69,10,10,0.8); border-color: rgba(239,68,68,0.2); color: #fca5a5; }
    .btn-apple:hover { background-color: rgba(127,29,29,0.9); }
    .btn-cake { background-color: rgba(131,24,67,0.8); border-color: rgba(244,63,94,0.2); color: #fbcfe8; }
    .btn-cake:hover { background-color: rgba(157,23,77,0.9); }
  </style>
</head>
<body>

  <div style="width: 100% !important; height: 100% !important; clear: both; position: relative; display: flex; align-items: center; justify-content: center; box-sizing: border-box;">
    <div style="position: absolute; inset: 0; background: radial-gradient(ellipse at top, #0e1628, #040508, #020305); pointer-events: none;"></div>
    
    <div style="position: relative; width: 100%; height: 100%; background-color: #090d16; overflow: hidden;">
      
      <canvas id="dinoCanvas" style="width: 100%; height: 100%; display: block; background-color: #070a11; cursor: crosshair;"></canvas>
      
      <div style="position: absolute; top: 10px; left: 12px; background-color: rgba(15,23,42,0.8); border: 1px solid rgba(255,255,255,0.05); padding: 4px 8px; border-radius: 6px; font-size: 11px; font-family: monospace; color: #a1a1aa;">
        <span style="color: #00f2ff; font-weight: bold;">● 恐龍巡邏橫幅</span> | 已餵食: <span id="eatCount" style="color: #f43f5e; font-weight: bold;">0</span>
      </div>
      
      <div style="position: absolute; top: 8px; right: 10px; display: flex; gap: 6px; align-items: center;">
        <button id="btnApple" class="btn-action btn-apple">🍎 蘋果</button>
        <button id="btnCake" class="btn-action btn-cake">✨ 蛋糕</button>
        <button id="btnSkin" class="btn-action">🎨 外觀</button>
        <button id="btnFlame" class="btn-action">🔥 吐息</button>
        <button id="btnAudio" class="btn-action">🔇 音效: OFF</button>
        <button id="btnReset" class="btn-action">🔄</button>
      </div>

      <div style="position: absolute; bottom: 6px; left: 12px; font-size: 10px; font-family: monospace; color: #52525b; pointer-events: none;">
        點擊橫幅任何地方都可以投下點心餵食喔！
      </div>
    </div>
  </div>

  <script>
    const DINO_FRAMES = {
      idle: [
        [
          "............BBBB........", "...........BBBBBB.......", "...........BBSEBB.......", "...........BBBBBB.......",
          "...........BBBB.........", "..........BBBBBBBBB.....", ".........BBBBBBBBBBBBB..", ".........BBBBBBBBBBBB...",
          ".........BBBBBBBBBBB....", "........BBBBBBBBBBBB....", "........BBBBBBBBBBBB....", "........BBBBBBBBBBBB....",
          ".........BBBBBBBBBBB....", "..........BBBBBBBBBB....", "...........BBBBBBBB.....", "............BBBBBB......",
          "............C..C........", "............C..C........", "...........CC..CC.......", "........................"
        ]
      ],
      walk: [
        [
          "............BBBB........", "...........BBBBBB.......", "...........BBSEBB.......", "...........BBBBBB.......",
          "...........BBBB.........", "..........BBBBBBBBB.....", ".........BBBBBBBBBBBBB..", ".........BBBBBBBBBBBB...",
          ".........BBBBBBBBBBB....", "........BBBBBBBBBBBB....", "........BBBBBBBBBBBB....", "........BBBBBBBBBBBB....",
          ".........BBBBBBBBBBB....", "..........BBBBBBBBBB....", "...........BBBBBBBB.....", "............BBBBBB......",
          "............C...........", "............C...........", "...........CC...........", "........................"
        ],
        [
          "............BBBB........", "...........BBBBBB.......", "...........BBSEBB.......", "...........BBBBBB.......",
          "...........BBBB.........", "..........BBBBBBBBB.....", ".........BBBBBBBBBBBBB..", ".........BBBBBBBBBBBB...",
          ".........BBBBBBBBBBB....", "........BBBBBBBBBBBB....", "........BBBBBBBBBBBB....", "........BBBBBBBBBBBB....",
          ".........BBBBBBBBBBB....", "..........BBBBBBBBBB....", "...........BBBBBBBB.....", "............BBBBBB......",
          "...............C........", "...............C........", "..............CC........", "........................"
        ]
      ],
      fire: [
        [
          "............BBBB........", "...........BBBBBB.......", "...........BBSEBB...MM..", "...........BBBBBB..MM...",
          "...........BBBB...MM....", "..........BBBBBBBBB.....", ".........BBBBBBBBBBBBB..", ".........BBBBBBBBBBBB...",
          ".........BBSSBBBBBBB....", "........BBSSBBBBBBBB....", "........BSSBBBBBBBBB....", "........BSSBBBBBBBBB....",
          ".........SSBBBBBBBBB....", "..........BBBBBBBBBB....", "...........BBBBBBBB.....", "............BBBBBB......",
          "............C..C........", "............C..C........", "...........CC..CC.......", "........................"
        ],
        [
          "............BBBB........", "...........BBBBBB.......", "...........BBSEBB..MMM..", "...........BBBBBB.MMM...",
          "...........BBBB..MMM....", "..........BBBBBBBBB.....", ".........BBBBBBBBBBBBB..", ".........BBBBBBBBBBBB...",
          ".........BBSSBBBBBBB....", "........BBSSBBBBBBBB....", "........BSSBBBBBBBBB....", "........BSSBBBBBBBBB....",
          ".........SSBBBBBBBBB....", "..........BBBBBBBBBB....", "...........BBBBBBBB.....", "............BBBBBB......",
          "............C..C........", "............C..C........", "...........CC..CC.......", "........................"
        ]
      ]
    };

    const TREE_FRAMES = [
      "....TT....", "...TTTT...", "..TTTTTT..", ".TTTTTTTT.", "TTTTTTTTTT", "....HH....", "....HH...."
    ];
    const APPLE_FRAME = ["..LL..", ".AAAA.", "AAAAAA", "AAAAAA", ".AAAA.", "..AA.."];
    const CAKE_FRAME  = ["..FF..", ".CWCW.", "MMMMM", "MMMMM"];

    const DINO_SKINS = [
      { id: 'cyber', name: 'Cyber Neon', primary: '#0df', secondary: '#005f73', accent: '#f72585', plates: '#7209b7', eye: '#ffffff' },
      { id: 'gigan', name: 'Emerald Rex', primary: '#10b981', secondary: '#a7f3d0', accent: '#fbbf24', plates: '#06b6d4', eye: '#ef4444' },
      { id: 'magma', name: 'Volcanic Red', primary: '#ef4444', secondary: '#fcd34d', accent: '#ffffff', plates: '#b91c1c', eye: '#f59e0b' },
      { id: 'cosmic', name: 'Cosmic Star', primary: '#8b5cf6', secondary: '#4c1d95', plates: '#f59e0b', accent: '#ec4899', eye: '#06b6d4' }
    ];

    const FLAME_PRESETS = [
      { id: 'plasma', name: 'Teal Plasma', primary: '#06b6d4', secondary: '#3b82f6' },
      { id: 'thermo', name: 'Hellfire', primary: '#f97316', secondary: '#facc15' },
      { id: 'toxic', name: 'Acid Mist', primary: '#22c55e', secondary: '#15803d' },
      { id: 'star', name: 'Starlight', primary: '#ec4899', secondary: '#8b5cf6' }
    ];

    class RetroSynth {
      constructor() { this.ctx = null; this.muted = true; this.sizzleOsc = null; }
      init() { if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); }
      setMute(m) { this.muted = m; if (m) this.stopFireSizzle(); }
      triggerRoar() {
        if (this.muted) return; this.init(); const now = this.ctx.currentTime;
        const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
        osc.type = 'sawtooth'; osc.frequency.setValueAtTime(90, now); osc.frequency.linearRampToValueAtTime(40, now + 0.4);
        gain.gain.setValueAtTime(0.2, now); gain.gain.linearRampToValueAtTime(0.01, now + 0.4);
        osc.connect(gain); gain.connect(this.ctx.destination); osc.start(now); osc.stop(now + 0.4);
      }
      triggerEatSound() {
        if (this.muted) return; this.init(); const now = this.ctx.currentTime;
        const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
        osc.type = 'triangle'; osc.frequency.setValueAtTime(150, now); osc.frequency.setValueAtTime(300, now + 0.08);
        gain.gain.setValueAtTime(0.12, now); gain.gain.linearRampToValueAtTime(0.01, now + 0.15);
        osc.connect(gain); gain.connect(this.ctx.destination); osc.start(now); osc.stop(now + 0.15);
      }
      startFireSizzle() {
        if (this.muted || this.sizzleOsc) return; this.init();
        try {
          const now = this.ctx.currentTime; this.sizzleOsc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
          this.sizzleOsc.type = 'square'; this.sizzleOsc.frequency.setValueAtTime(220, now); gain.gain.setValueAtTime(0.02, now);
          const lfo = this.ctx.createOscillator(); const lfoGain = this.ctx.createGain();
          lfo.type = 'sawtooth'; lfo.frequency.setValueAtTime(35, now); lfoGain.gain.setValueAtTime(100, now);
          lfo.connect(lfoGain); lfoGain.connect(this.sizzleOsc.frequency);
          this.sizzleOsc.connect(gain); gain.connect(this.ctx.destination);
          lfo.start(now); this.sizzleOsc.start(now); this.sizzleOsc.lfoRef = lfo;
        } catch(e){}
      }
      stopFireSizzle() { if (this.sizzleOsc) { try { this.sizzleOsc.stop(); this.sizzleOsc.lfoRef.stop(); } catch(e){} this.sizzleOsc = null; } }
    }

    const canvas = document.getElementById('dinoCanvas');
    const ctx = canvas.getContext('2d');
    const synth = new RetroSynth();

    let consumedCount = 0; let skinIdx = 0; let flameIdx = 0; let soundOn = false;
    let snacks = []; let sparks = []; let trees = []; let stars = [];
    let dino = { x: 200, y: 0, direction: 1, frameIndex: 0, ticks: 0, isEating: false, eatingTicks: 0, speechBubble: { text: "Looker Studio 滿版巡邏中！🦖🔥", ticks: 150 } };

    // 動態監聽 Looker Studio 元件大小
    function resizeCanvas() {
      canvas.width = canvas.clientWidth;
      canvas.height = canvas.clientHeight;
      
      // 根據高度動態計算像素粒子縮放大小，確保完美比例
      const currentHeight = canvas.height;
      window.scaleFactor = (currentHeight / 90) * 2.1; 
      
      // 重新產布背景裝飾物
      if (trees.length === 0) {
        for (let i = 0; i < 8; i++) { trees.push({ x: 100 + i * (canvas.width / 8) + Math.random() * 20, heightScale: 0.85 + Math.random() * 0.3 }); }
        for (let i = 0; i < 40; i++) { stars.push({ x: Math.random() * canvas.width, y: Math.random() * (canvas.height * 0.5), size: 1.5 + Math.random() * 2, alpha: Math.random(), blinkSpeed: 0.006 + Math.random() * 0.012 }); }
      }
    }
    window.addEventListener('resize', resizeCanvas);
    setTimeout(resizeCanvas, 100);

    function dropSnack(type, customX) {
      const s = window.scaleFactor || 2.1;
      snacks.push({ id: Date.now(), type, x: customX || (80 + Math.random() * (canvas.width - 160)), y: -20, vy: 2, isGrounded: false, size: s * 1.33 });
    }

    document.getElementById('btnApple').onclick = (e) => { e.stopPropagation(); dropSnack('apple'); };
    document.getElementById('btnCake').onclick = (e) => { e.stopPropagation(); dropSnack('cake'); };
    document.getElementById('btnSkin').onclick = (e) => { e.stopPropagation(); skinIdx = (skinIdx + 1) % DINO_SKINS.length; synth.triggerEatSound(); };
    document.getElementById('btnFlame').onclick = (e) => { e.stopPropagation(); flameIdx = (flameIdx + 1) % FLAME_PRESETS.length; synth.triggerEatSound(); };
    document.getElementById('btnReset').onclick = (e) => { e.stopPropagation(); snacks = []; sparks = []; dino.x = 200; dino.direction = 1; dino.speechBubble = { text: "重置完畢！", ticks: 100 }; synth.triggerRoar(); };
    
    document.getElementById('btnAudio').onclick = (e) => {
      e.stopPropagation(); soundOn = !soundOn; synth.setMute(!soundOn);
      document.getElementById('btnAudio').innerText = soundOn ? "🔊 音效: ON" : "🔇 音效: OFF";
      document.getElementById('btnAudio').style.borderColor = soundOn ? "#10b981" : "rgba(255,255,255,0.15)";
      if (soundOn) { synth.triggerRoar(); synth.startFireSizzle(); }
    };

    canvas.onclick = (e) => {
      const rect = canvas.getBoundingClientRect();
      const clickX = (e.clientX - rect.left) * (canvas.width / rect.width);
      dropSnack(Math.random() > 0.5 ? 'apple' : 'cake', clickX);
      synth.triggerEatSound();
    };

    let frameCount = 0;
    function gameLoop() {
      frameCount++;
      if (canvas.width === 0 || canvas.height === 0) { requestAnimationFrame(gameLoop); return; }
      
      const sF = window.scaleFactor || 2.1;
      const gY = canvas.height - (16 * (sF / 2.1)); 
      const currentSkin = DINO_SKINS[skinIdx];
      const currentFlame = FLAME_PRESETS[flameIdx];

      ctx.fillStyle = '#0a0d17'; ctx.fillRect(0, 0, canvas.width, canvas.height);
      stars.forEach(star => {
        star.alpha += star.blinkSpeed; if (star.alpha > 1 || star.alpha < 0.2) star.blinkSpeed = -star.blinkSpeed;
        ctx.fillStyle = `rgba(255, 255, 255, ${star.alpha})`; ctx.fillRect(star.x, star.y, star.size, star.size);
      });

      ctx.fillStyle = '#111827'; ctx.fillRect(0, gY, canvas.width, canvas.height - gY);
      ctx.strokeStyle = 'rgba(99, 102, 241, 0.25)'; ctx.lineWidth = sF > 3 ? 3 : 1.5;
      ctx.beginPath(); ctx.moveTo(0, gY); ctx.lineTo(canvas.width, gY); ctx.stroke();

      trees.forEach(t => {
        const tScale = (sF * 0.66) * t.heightScale;
        const sway = Math.sin(frameCount * 0.03 + t.x * 0.1) * (sF * 0.3);
        const tLeftX = t.x - (10 * tScale) / 2 + sway; const tTopY = gY - 7 * tScale + 1;
        for (let r = 0; r < 7; r++) {
          for (let c = 0; c < 10; c++) {
            const char = TREE_FRAMES[r][c]; if (char === '.') continue;
            ctx.fillStyle = char === 'T' ? '#047857' : '#78350f';
            ctx.fillRect(tLeftX + c * tScale, tTopY + r * tScale, tScale, tScale);
          }
        }
      });

      snacks.forEach(sn => {
        if (!sn.isGrounded) {
          sn.vy += 0.3; sn.y += sn.vy;
          if (sn.y >= gY - sn.size) { sn.y = gY - sn.size; sn.vy = -sn.vy * 0.3; if (Math.abs(sn.vy) < 0.6) sn.isGrounded = true; }
        }
      });

      const dinoW = 24 * sF; const dinoH = 20 * sF;
      dino.y = gY - dinoH + (sF * 0.8);

      if (dino.isEating) {
        dino.eatingTicks++; if (dino.eatingTicks > 45) { dino.isEating = false; dino.eatingTicks = 0; }
      } else {
        dino.ticks++;
        if (dino.ticks % 6 === 0) dino.frameIndex = (dino.frameIndex + 1) % 2;
        dino.x += dino.direction * (sF * 0.6);

        let foodToChase = null; let shortestDist = 99999;
        snacks.forEach(sn => { const dx = sn.x - (dino.x + dinoW / 2); if (Math.abs(dx) < shortestDist) { shortestDist = Math.abs(dx); foodToChase = sn; } });
        if (foodToChase && shortestDist < (canvas.width * 0.5)) {
          dino.direction = foodToChase.x > (dino.x + dinoW / 2) ? 1 : -1;
        } else {
          if (dino.x > canvas.width - dinoW - 20 && dino.direction === 1) dino.direction = -1;
          else if (dino.x < 20 && dino.direction === -1) dino.direction = 1;
        }
      }

      snacks = snacks.filter(sn => {
        if (Math.abs(sn.x - (dino.x + dinoW / 2)) < (dinoW * 0.4) && sn.y > gY - (dinoH * 0.5)) {
          dino.isEating = true; dino.eatingTicks = 0; consumedCount++;
          document.getElementById('eatCount').innerText = consumedCount;
          dino.speechBubble = { text: ["好吃！ ♥", "美味 ✨", "讚啦 🍰", "嗷嗚 🍎"][Math.floor(Math.random() * 4)], ticks: 80 };
          synth.triggerEatSound();
          for (let s = 0; s < 8; s++) { sparks.push({ x: sn.x, y: sn.y, vx: (Math.random() - 0.5) * 4, vy: (Math.random() - 1) * 4, color: sn.type === 'apple' ? '#ef4444' : '#fb7185', size: sF, life: 0, maxLife: 20 }); }
          return false;
        }
        return true;
      });

      let activeMatrix = DINO_FRAMES.fire[frameCount % 18 < 9 ? 0 : 1]; 
      if (dino.isEating) activeMatrix = DINO_FRAMES.fire[frameCount % 10 < 5 ? 0 : 1];

      const isFacingRight = dino.direction === 1;
      for (let r = 0; r < 20; r++) {
        for (let c = 0; c < 24; c++) {
          const char = activeMatrix[r][c]; if (char === '.') continue;
          const drawCol = isFacingRight ? c : (23 - c);
          let pixelColor = currentSkin.primary;
          if (char === 'B') pixelColor = currentSkin.secondary;
          else if (char === 'S') pixelColor = frameCount % 12 < 6 ? '#ffffff' : currentFlame.primary;
          else if (char === 'E') pixelColor = currentSkin.eye;
          else if (char === 'M') pixelColor = '#ffd200';

          ctx.fillStyle = pixelColor; ctx.fillRect(dino.x + drawCol * sF, dino.y + r * sF, sF, sF);
        }
      }

      const realMouthX = dino.x + (isFacingRight ? 18.5 : 5.5) * sF; const realMouthY = dino.y + 5.2 * sF;
      for (let i = 0; i < 2; i++) {
        const angle = (isFacingRight ? 0 : Math.PI) + (Math.random() - 0.5) * 0.25; const pSpeed = (sF * 2.5) * (0.8 + Math.random() * 0.4);
        sparks.push({ x: realMouthX, y: realMouthY, vx: Math.cos(angle) * pSpeed + dino.direction * 0.5, vy: Math.sin(angle) * pSpeed + (Math.random() - 0.5) * 1.0, color: Math.random() > 0.45 ? currentFlame.primary : currentFlame.secondary, size: sF * 1.2, life: 0, maxLife: 25 });
      }

      snacks.forEach(sn => {
        const sM = sn.type === 'apple' ? APPLE_FRAME : CAKE_FRAME;
        for (let r = 0; r < sM.length; r++) {
          for (let c = 0; c < sM[r].length; c++) {
            const char = sM[r][c]; if (char === '.') continue;
            let col = '#ef4444'; if (char === 'L') col = '#10b981'; else if (char === 'C') col = '#f59e0b'; else if (char === 'W') col = '#ffedd5'; else if (char === 'M') col = '#ec4899';
            ctx.fillStyle = col; ctx.fillRect(sn.x + (c - sM[r].length / 2) * (sn.size / 4), sn.y + (r - sM.length / 2) * (sn.size / 4), sn.size / 4, sn.size / 4);
          }
        }
      });

      sparks.forEach(p => {
        p.life++; p.vy += -0.02; p.x += p.vx; p.y += p.vy;
        ctx.fillStyle = p.color; ctx.fillRect(p.x, p.y, Math.max(1, p.size * (1 - p.life / p.maxLife)), Math.max(1, p.size * (1 - p.life / p.maxLife)));
      });
      sparks = sparks.filter(p => p.life < p.maxLife);

      if (dino.speechBubble && dino.speechBubble.ticks > 0) {
        dino.speechBubble.ticks--; ctx.font = `bold ${Math.max(10, sF * 4.5)}px system-ui`;
        const txt = dino.speechBubble.text; const txtW = ctx.measureText(txt).width;
        const rx = (dino.x + dinoW / 2) - (txtW + 16) / 2; const ry = dino.y - (sF * 6);
        ctx.fillStyle = 'rgba(15, 23, 42, 0.9)'; ctx.strokeStyle = currentFlame.primary; ctx.lineWidth = 1.5;
        ctx.fillRect(rx, ry, txtW + 16, sF * 6); ctx.strokeRect(rx, ry, txtW + 16, sF * 6);
        ctx.fillStyle = '#ffffff'; ctx.fillText(txt, rx + 8, ry + (sF * 4.2));
      }

      requestAnimationFrame(gameLoop);
    }

    gameLoop();
  </script>
</body>
</html>
