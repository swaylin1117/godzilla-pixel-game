<!DOCTYPE html>
<html lang="zh-TW">
<head>

  <style>
    /* 移除所有外部 CDN，全用標準 CSS 鋪底 */
    body {
      margin: 0; padding: 0; background-color: #05070d; overflow: hidden;
      color: #e2e8f0; font-family: ui-sans-serif, system-ui, sans-serif;
    }
    .select-none { user-select: none; -webkit-user-select: none; }
    .flex-center { display: flex; flex-direction: column; align-items: center; justify-content: center; }
    
    /* 按鈕樣式自訂，擺脫對 Tailwind 的依賴 */
    .btn-action {
      height: 20px; padding: 0 8px; border-radius: 4px; font-family: monospace; font-size: 10px;
      cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 4px;
      border: 1px solid rgba(255,255,255,0.15); background-color: #0f172a; color: #a1a1aa;
    }
    .btn-action:hover { background-color: #1e293b; color: #fff; }
    .btn-apple { background-color: rgba(69,10,10,0.8); border-color: rgba(239,68,68,0.2); color: #fca5a5; }
    .btn-apple:hover { background-color: rgba(127,29,29,0.9); }
    .btn-cake { background-color: rgba(131,24,67,0.8); border-color: rgba(244,63,94,0.2); color: #fbcfe8; }
    .btn-cake:hover { background-color: rgba(157,23,77,0.9); }
  </style>
</head>
<body>

  <div class="flex-center" style="min-height: 100vh; padding: 16px; position: relative;">
    <div style="position: absolute; inset: 0; background: radial-gradient(ellipse at top, #0e1628, #040508, #020305); pointer-events: none;"></div>
    
    <div class="flex-center" style="gap: 16px; width: 100%; maxWidth: 760px; z-index: 10;">
      <div style="position: relative; width: 100%; max-width: 728px; aspect-ratio: 728/90; background-color: #090d16; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; overflow: hidden; box-shadow: 0 0 40px rgba(0,0,0,0.7);">
        
        <canvas id="dinoCanvas" width="728" height="90" style="width: 100%; height: 100%; display: block; background-color: #070a11; cursor: crosshair;"></canvas>
        
        <div style="position: absolute; top: 8px; left: 8px; background-color: rgba(15,23,42,0.8); border: 1px solid rgba(255,255,255,0.05); padding: 2px 6px; border-radius: 4px; font-size: 9px; font-family: monospace; color: #a1a1aa;">
          <span style="color: #00f2ff; font-weight: bold;">● 恐龍巡邏橫幅</span> | 已餵食: <span id="eatCount" style="color: #f43f5e; font-weight: bold;">0</span>
        </div>
        
        <div style="position: absolute; top: 6px; right: 6px; display: flex; gap: 4px; align-items: center;">
          <button id="btnApple" class="btn-action btn-apple">🍎 蘋果</button>
          <button id="btnCake" class="btn-action btn-cake">✨ 蛋糕</button>
          <button id="btnSkin" class="btn-action" title="換外觀">🎨 外觀</button>
          <button id="btnFlame" class="btn-action" title="換吐息">🔥 吐息</button>
          <button id="btnAudio" class="btn-action">🔇 音效: OFF</button>
          <button id="btnReset" class="btn-action" title="重設">🔄</button>
        </div>

        <div style="position: absolute; bottom: 4px; left: 8px; font-size: 8px; font-family: monospace; color: #52525b; pointer-events: none;">
          點擊 Banner 任何草地或天空，都可以掉下點心餵食喔！
        </div>
      </div>
      
      <div style="text-align: center; font-family: monospace; opacity: 0.6; font-size: 10px; color: #71717a; letter-spacing: 0.1em;">
        PIXEL DINO AMBIENT PATROL BANNER 728 x 90 SCREENPLAY
      </div>
    </div>
  </div>

    // ==========================================
    // 2. 音效系統 (Web Audio API)
    // ==========================================
    class RetroSynth {
      constructor() { this.ctx = null; this.muted = true; this.sizzleOsc = null; }
      init() { if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); }
      setMute(m) { this.muted = m; if (m) this.stopFireSizzle(); }
      triggerRoar() {
        if (this.muted) return; this.init(); const now = this.ctx.currentTime;
        const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
        osc.type = 'sawtooth'; osc.frequency.setValueAtTime(90, now); osc.frequency.linearRampToValueAtTime(40, now + 0.4);
        gain.gain.setValueAtTime(0.2, now); gain.gain.linearRampToValueAtTime(0.01, now + 0.4);
        osc.connect(gain); gain.connect(this.ctx.destination); osc.start(now); osc.stop(now + 0.4);
      }
      triggerEatSound() {
        if (this.muted) return; this.init(); const now = this.ctx.currentTime;
        const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
        osc.type = 'triangle'; osc.frequency.setValueAtTime(150, now); osc.frequency.setValueAtTime(300, now + 0.08);
